[build-system]
requires = ["setuptools==83.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "creator-map-schemas"
version = "0.1.0"
description = "Restricted/public-neutral shared contract boundary"
requires-python = ">=3.11,<3.13"
dependencies = ["jsonschema==4.24.0", "pydantic==2.11.7"]

[tool.setuptools.package-data]
creator_map_schemas = ["py.typed"]
