[build-system]
requires = ["setuptools==83.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "creator-map-pipeline"
version = "0.1.0"
description = "Restricted Dagster metadata pipeline"
requires-python = ">=3.11,<3.13"
dependencies = [
  "creator-map-restricted-infra==0.1.0",
  "creator-map-schemas==0.1.0",
  "dagster==1.13.1",
  "duckdb==1.3.1",
  "pyarrow==23.0.1",
]

[tool.setuptools.package-data]
creator_map_pipeline = ["py.typed"]
