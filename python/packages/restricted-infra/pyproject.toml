[build-system]
requires = ["setuptools==83.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "creator-map-restricted-infra"
version = "0.1.0"
description = "Restricted infrastructure adapters and ports"
requires-python = ">=3.11,<3.13"
dependencies = [
  "creator-map-schemas==0.1.0",
  "pydantic==2.11.7",
  "psycopg[binary]==3.2.9",
]

[tool.setuptools.package-data]
creator_map_restricted = ["py.typed"]
